<div class="flex h-screen w-full bg-gray-50 dark:bg-gray-900 overflow-hidden font-sans transition-colors duration-500">
  
  <aside class="flex flex-col bg-white dark:bg-gray-800 border-r border-gray-100 dark:border-gray-700 shadow-xl transition-all duration-300 ease-in-out z-30 relative"
         [ngClass]="isSidebarCollapsed ? 'w-20' : 'w-64'">
         
    <button (click)="toggleSidebar()"
            class="absolute -right-3 top-7 w-6 h-6 bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-600 rounded-full flex items-center justify-center text-gray-500 hover:text-blue-600 hover:border-blue-400 shadow-md transition-all z-50 hover:scale-110 active:scale-95 focus:outline-none">
      <i class="pi text-[10px] transition-transform duration-500"
         [ngClass]="isSidebarCollapsed ? 'pi-angle-right' : 'pi-angle-left'"></i>
    </button>
    
    <div class="h-20 flex items-center border-b border-gray-50 dark:border-gray-700 shrink-0 transition-all duration-300">
      <div class="flex items-center gap-3 w-full" [ngClass]="isSidebarCollapsed ? 'justify-center px-0' : 'px-6'">
        <div class="w-10 h-10 shrink-0 bg-gradient-to-tr from-blue-700 to-blue-500 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/20">
          <i class="pi pi-th-large text-white text-lg"></i>
        </div>

        <h2 class="text-xl font-black tracking-tight text-gray-800 dark:text-white transition-all duration-300 overflow-hidden whitespace-nowrap"
            [ngClass]="isSidebarCollapsed ? 'w-0 opacity-0' : 'w-auto opacity-100'"
            [innerHTML]="'APP.BRAND_HTML' | translate"></h2>
      </div>
    </div>

    <nav class="flex-1 overflow-y-auto overflow-x-hidden py-6 px-3 space-y-1.5 custom-scrollbar">
      <a *ngFor="let item of filteredMenuItems"
         [routerLink]="item.route"
         routerLinkActive="active-link"
         class="flex items-center gap-4 px-3 py-3 rounded-xl text-gray-500 dark:text-gray-400 hover:bg-blue-50/50 dark:hover:bg-blue-900/20 hover:text-blue-600 dark:hover:text-blue-400 transition-all group cursor-pointer relative"
         [ngClass]="isSidebarCollapsed ? 'justify-center' : 'justify-start'"
         [title]="isSidebarCollapsed ? (item.label | translate) : ''">
         
        <div class="absolute left-0 w-1 h-6 bg-blue-600 rounded-r-full scale-y-0 transition-transform duration-300 origin-center indicator"></div>

        <i class="pi {{ item.icon }} text-lg transition-all group-hover:scale-110 shrink-0"
           routerLinkActive="text-blue-600 dark:text-blue-400"></i>

        <span class="text-sm font-semibold transition-all duration-300 overflow-hidden whitespace-nowrap"
              [ngClass]="isSidebarCollapsed ? 'w-0 opacity-0 hidden' : 'w-auto opacity-100 block'">
          {{ item.label | translate }}
        </span>
      </a>
    </nav>

    <div class="p-4 border-t border-gray-50 dark:border-gray-700" *ngIf="!isSidebarCollapsed">
      <div class="bg-gray-50 dark:bg-gray-900/50 rounded-xl p-3">
        <p class="text-[10px] uppercase font-bold text-gray-400 tracking-wider">
          {{ 'APP.VERSION' | translate }}
        </p>
      </div>
    </div>
  </aside>

  <div class="flex-1 flex flex-col overflow-hidden relative">
    <app-header class="shrink-0 z-20 shadow-sm"></app-header>

    <main class="flex-1 overflow-y-auto bg-gray-50/30 dark:bg-gray-900 scroll-smooth transition-all duration-500"
          [ngClass]="currentLayout === 'compact' ? 'p-2 md:p-3 lg:p-4' : 'p-4 md:p-6 lg:p-10'">
      <div class="max-w-[1600px] mx-auto">
        <router-outlet></router-outlet>
      </div>
      <div class="h-10 md:hidden"></div>
    </main>
  </div>
</div>
