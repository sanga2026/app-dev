<header class="w-full h-20 bg-white dark:bg-gray-900 border-b border-gray-100 dark:border-gray-800 flex items-center justify-between px-6 lg:px-10 z-40 transition-colors duration-500">
  
  <div class="flex items-center gap-3">
    <div class="w-9 h-9 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-200 dark:shadow-none">
      <i class="pi pi-th-large text-white"></i>
    </div>
    <h2 class="text-xl font-bold text-gray-800 dark:text-white">{{ 'APP.SYSTEM_NAME' | translate }}</h2>
  </div>

  <button (click)="goToProfile()" 
          [title]="'PROFILE.TITLE' | translate"
          class="flex items-center gap-3 p-1.5 pl-4 rounded-full hover:bg-gray-50 dark:hover:bg-gray-800 border border-transparent hover:border-gray-200 dark:hover:border-gray-700 transition-all active:scale-95 group">
    
    <div class="text-right hidden sm:block">
      <p class="text-sm font-bold text-gray-900 dark:text-white leading-tight group-hover:text-blue-600 dark:group-hover:text-blue-400 transition-colors">
        {{ currentUser?.fullName }}
      </p>
      <p class="text-[10px] text-gray-500 uppercase tracking-widest font-bold">
        {{ currentUser?.role }}
      </p>
    </div>
    
    <div class="w-10 h-10 rounded-full bg-gradient-to-br from-blue-600 to-indigo-700 text-white flex items-center justify-center font-bold border-2 border-white dark:border-gray-800 shadow-md group-hover:shadow-lg group-hover:scale-105 transition-all">
      {{ userInitials }}
    </div>
  </button>

</header>
