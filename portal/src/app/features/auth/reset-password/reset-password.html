<p-toast position="top-right"></p-toast>

<div class="min-h-screen flex items-center justify-center bg-gray-50 dark:bg-gray-900 p-6">
  <div class="w-full max-w-md space-y-8 bg-white dark:bg-gray-800 p-10 rounded-2xl shadow-xl">
    
    <div class="text-center">
      <h2 class="text-3xl font-bold text-gray-900 dark:text-white">Create New Password</h2>
      <p class="mt-2 text-gray-500 dark:text-gray-400">Please enter a strong password to secure your account.</p>
    </div>

    <form class="mt-8 space-y-6" (ngSubmit)="onResetPassword()">
      <div class="space-y-4">
        
        <div>
          <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">New Password</label>
          <div class="relative">
           <i class="pi pi-lock absolute left-4 top-3.5 text-gray-400"></i>
  <input [type]="showNewPassword ? 'text' : 'password'" name="newPassword" [(ngModel)]="newPassword"
         class="w-full pl-11 pr-10 py-3 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500 outline-none transition-all">
  
  <i class="pi absolute right-4 top-3.5 text-gray-400 z-10 cursor-pointer hover:text-blue-500 transition-colors" 
     [ngClass]="showNewPassword ? 'pi-eye' : 'pi-eye-slash'" 
     (click)="showNewPassword = !showNewPassword"></i>
          </div>
        </div>

        <div>
          <label class="block text-sm font-bold text-gray-700 dark:text-gray-300 mb-1">Confirm Password</label>
          <div class="relative">
           <i class="pi pi-check-circle absolute left-4 top-3.5 text-gray-400"></i>
  <input [type]="showConfirmPassword ? 'text' : 'password'" name="confirmPassword" [(ngModel)]="confirmPassword"
         class="w-full pl-11 pr-10 py-3 rounded-xl border border-gray-200 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 text-gray-900 dark:text-white focus:ring-2 focus:ring-blue-500 outline-none transition-all">
  
  <i class="pi absolute right-4 top-3.5 text-gray-400 z-10 cursor-pointer hover:text-blue-500 transition-colors" 
     [ngClass]="showConfirmPassword ? 'pi-eye' : 'pi-eye-slash'" 
     (click)="showConfirmPassword = !showConfirmPassword"></i>
          </div>
        </div>
        
      </div>

      <button type="submit" [disabled]="isProcessing || !token"
              class="w-full py-4 bg-blue-600 hover:bg-blue-700 disabled:bg-gray-400 text-white rounded-xl font-bold text-lg transition-all flex justify-center items-center shadow-lg shadow-blue-200 dark:shadow-none transform active:scale-95">
        <i *ngIf="isProcessing" class="pi pi-spin pi-spinner mr-2"></i>
        Update Password
      </button>
    </form>
  </div>
</div>
