<div class="flex h-screen w-full bg-slate-50 dark:bg-slate-950 overflow-hidden transition-colors duration-300">

  <!-- ─── SIDEBAR ─────────────────────────────────────────────── -->
  <aside class="flex flex-col shrink-0 bg-white dark:bg-slate-900
                border-r border-slate-100 dark:border-slate-800
                shadow-[4px_0_24px_-4px_rgb(0_0_0/.06)]
                transition-all duration-300 ease-[cubic-bezier(.16,1,.3,1)] z-30 relative"
         [ngClass]="isSidebarCollapsed ? 'w-[72px]' : 'w-64'">

    <!-- Collapse toggle -->
    <button (click)="toggleSidebar()"
            class="absolute -right-3.5 top-8 w-7 h-7 rounded-full
                   bg-white dark:bg-slate-800
                   border border-slate-200 dark:border-slate-700
                   shadow-md text-slate-400 hover:text-blue-600
                   hover:border-blue-400 hover:shadow-blue-200/50
                   dark:hover:shadow-none
                   flex items-center justify-center
                   transition-all duration-200 z-50
                   hover:scale-110 active:scale-95 focus:outline-none">
      <i class="pi text-[9px] font-bold transition-transform duration-500"
         [ngClass]="isSidebarCollapsed ? 'pi-chevron-right' : 'pi-chevron-left'"></i>
    </button>

    <!-- Brand -->
    <div class="h-[72px] flex items-center border-b border-slate-100 dark:border-slate-800 shrink-0 px-4">
      <div class="flex items-center gap-3 w-full overflow-hidden">
        <div class="w-10 h-10 shrink-0 rounded-xl flex items-center justify-center
                    bg-gradient-to-br from-blue-600 to-indigo-600
                    shadow-lg shadow-blue-500/30 dark:shadow-blue-900/40">
          <i class="pi pi-building-columns text-white text-base"></i>
        </div>
        <div class="overflow-hidden transition-all duration-300"
             [ngClass]="isSidebarCollapsed ? 'w-0 opacity-0' : 'w-auto opacity-100'">
          <h1 class="text-base font-black tracking-tight text-slate-900 dark:text-white whitespace-nowrap"
              [innerHTML]="'APP.BRAND_HTML' | translate"></h1>
          <p class="text-[10px] text-slate-400 dark:text-slate-500 font-medium tracking-widest uppercase whitespace-nowrap">
            {{ 'APP.PORTAL_TYPE' | translate }}
          </p>
        </div>
      </div>
    </div>

    <!-- Nav -->
    <nav class="flex-1 overflow-y-auto overflow-x-hidden py-5 custom-scrollbar"
         [ngClass]="isSidebarCollapsed ? 'px-3' : 'px-3'">

      <div class="space-y-0.5">
        <ng-container *ngFor="let item of filteredMenuItems; let i = index">

          <!-- Section divider if first of group -->
          <p *ngIf="!isSidebarCollapsed && item.group && item.group !== filteredMenuItems[i-1]?.group"
             class="section-label mt-3">
            {{ item.group }}
          </p>

          <a [routerLink]="item.route"
             routerLinkActive="active-link"
             class="flex items-center gap-3 px-3 py-2.5 rounded-xl
                    text-slate-500 dark:text-slate-400
                    hover:bg-blue-50 dark:hover:bg-blue-500/10
                    hover:text-blue-700 dark:hover:text-blue-400
                    transition-all duration-200 group relative"
             [ngClass]="isSidebarCollapsed ? 'justify-center' : ''"
             [title]="isSidebarCollapsed ? (item.label | translate) : ''">

            <!-- Active indicator bar -->
            <span class="absolute left-0 top-1/2 -translate-y-1/2 w-[3px] h-5 bg-blue-600 dark:bg-blue-400
                         rounded-r-full scale-y-0 transition-transform duration-200 origin-center indicator"></span>

            <i class="pi {{ item.icon }} text-base shrink-0
                      transition-all duration-200 group-hover:scale-110"></i>

            <span class="text-sm font-semibold whitespace-nowrap overflow-hidden transition-all duration-300"
                  [ngClass]="isSidebarCollapsed ? 'w-0 opacity-0' : 'w-auto opacity-100'">
              {{ item.label | translate }}
            </span>
          </a>
        </ng-container>
      </div>
    </nav>

    <!-- Footer version -->
    <div class="shrink-0 border-t border-slate-100 dark:border-slate-800 p-3"
         [ngClass]="isSidebarCollapsed ? 'flex justify-center' : ''">
      <div *ngIf="!isSidebarCollapsed"
           class="flex items-center gap-2 px-2 py-1.5 rounded-xl bg-slate-50 dark:bg-slate-800/60">
        <div class="w-2 h-2 rounded-full bg-emerald-400 pulse-ring"></div>
        <span class="text-[10px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-widest">
          {{ 'APP.VERSION' | translate }}
        </span>
      </div>
      <div *ngIf="isSidebarCollapsed"
           class="w-2 h-2 rounded-full bg-emerald-400 pulse-ring"></div>
    </div>
  </aside>

  <!-- ─── MAIN CONTENT ─────────────────────────────────────────── -->
  <div class="flex-1 flex flex-col overflow-hidden min-w-0">
    <app-header class="shrink-0 z-20"></app-header>

    <main class="flex-1 overflow-y-auto bg-slate-50/50 dark:bg-slate-950 scroll-smooth"
          [ngClass]="currentLayout === 'compact' ? 'p-4 md:p-5' : 'p-6 md:p-8'">
      <div class="max-w-[1600px] mx-auto">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>

</div>
