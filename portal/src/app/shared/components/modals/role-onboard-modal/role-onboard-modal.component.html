<p-dialog
  [(visible)]="visible"
  (onHide)="closeModal()"
  appendTo="body"
  [modal]="true"
  [style]="{ width: '860px', maxWidth: '95vw' }"
  [showHeader]="false"
  contentStyleClass="p-0 bg-transparent">

  <div class="bg-white dark:bg-gray-900 rounded-2xl overflow-hidden shadow-2xl border border-gray-200 dark:border-gray-700 flex flex-col max-h-[90vh]">

    <!-- Header -->
    <div class="px-6 py-4 border-b border-gray-100 dark:border-gray-700 flex justify-between items-center bg-gray-50 dark:bg-gray-800/50 shrink-0">
      <h3 class="font-bold text-gray-900 dark:text-white text-base flex items-center gap-2">
        <i class="pi pi-shield text-primary-600"></i>
        {{ (isEditMode ? 'PERMISSIONS.EDIT_ROLE' : 'PERMISSIONS.CREATE_ROLE') | translate }}
      </h3>
      <button type="button" (click)="closeModal()"
              class="text-gray-400 hover:text-red-500 transition-colors focus:outline-none">
        <i class="pi pi-times text-sm"></i>
      </button>
    </div>

    <!-- Body -->
    <div class="overflow-y-auto flex-1 p-6 space-y-5">
      <form [formGroup]="roleForm">

        <!-- Role Identity -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
          <div class="flex flex-col gap-1">
            <label class="text-xs font-semibold text-gray-700 dark:text-gray-300">
              {{ 'PERMISSIONS.ROLE_NAME' | translate }} <span class="text-red-500">*</span>
            </label>
            <input pInputText formControlName="name" placeholder="e.g. Senior Teller"
                   (blur)="generateSlug()"
                   class="w-full px-3 py-2 text-sm rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-800 text-gray-900 dark:text-white outline-none" />
            <small *ngIf="isFieldInvalid('name')" class="text-red-500 text-xs">Required.</small>
          </div>
          <div class="flex flex-col gap-1">
            <label class="text-xs font-semibold text-gray-700 dark:text-gray-300">
              {{ 'PERMISSIONS.ROLE_ID' | translate }} <span class="text-red-500">*</span>
            </label>
            <input pInputText formControlName="slug" placeholder="SENIOR_TELLER"
                   class="w-full px-3 py-2 text-sm rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-800 text-gray-900 dark:text-white outline-none font-mono uppercase" />
            <small class="text-gray-400 text-[10px]">Auto-generated · uppercase, underscores only</small>
          </div>
          <div class="flex flex-col gap-1">
            <label class="text-xs font-semibold text-gray-700 dark:text-gray-300">
              {{ 'PERMISSIONS.DESCRIPTION' | translate }}
            </label>
            <input pInputText formControlName="description" placeholder="Optional description"
                   class="w-full px-3 py-2 text-sm rounded-xl border border-gray-300 dark:border-gray-600 bg-gray-50 dark:bg-gray-800 text-gray-900 dark:text-white outline-none" />
          </div>
        </div>

        <div formGroupName="permissions">

          <!-- Sidebar Navigation Visibility -->
          <div class="bg-gray-50 dark:bg-gray-800 rounded-xl border border-gray-200 dark:border-gray-700 overflow-hidden">
            <div class="px-4 py-2.5 border-b border-gray-200 dark:border-gray-700 flex items-center gap-2">
              <i class="pi pi-bars text-primary-600 text-sm"></i>
              <span class="text-xs font-bold text-gray-700 dark:text-gray-300 uppercase tracking-wider">Sidebar Menu Visibility</span>
              <span class="text-[10px] text-gray-400 ml-1">— which nav items this role sees</span>
            </div>
            <div class="p-4" formGroupName="navigation">
              <div class="grid grid-cols-2 sm:grid-cols-4 gap-2">
                <label *ngFor="let nav of navResources"
                       class="flex items-center gap-2 p-2 rounded-lg border border-gray-200 dark:border-gray-700 cursor-pointer hover:bg-white dark:hover:bg-gray-700 transition-colors">
                  <input type="checkbox" [formControlName]="nav.key"
                         class="w-3.5 h-3.5 rounded accent-primary-600" />
                  <span class="text-xs font-medium text-gray-700 dark:text-gray-300">{{ nav.label }}</span>
                </label>
              </div>
            </div>
          </div>

          <!-- Data Access Matrix — grouped -->
          <ng-container *ngFor="let group of resourceGroups">
            <div class="bg-white dark:bg-gray-900 rounded-xl border border-gray-200 dark:border-gray-700 overflow-hidden">

              <div class="px-4 py-2 bg-gray-50 dark:bg-gray-800/80 border-b border-gray-100 dark:border-gray-800">
                <span class="text-[10px] font-bold text-gray-400 dark:text-gray-500 uppercase tracking-widest">{{ group }}</span>
              </div>

              <div class="divide-y divide-gray-100 dark:divide-gray-800">
                <div *ngFor="let res of resourcesInGroup(group)"
                     class="px-4 py-3 flex items-start gap-4"
                     [formGroupName]="res.key">

                  <!-- Resource label + grant/revoke all -->
                  <div class="w-32 shrink-0 pt-0.5">
                    <p class="text-xs font-semibold text-gray-800 dark:text-gray-200 leading-snug">{{ res.label }}</p>
                    <div class="flex gap-2 mt-1.5">
                      <button type="button" (click)="toggleAllActions(res.key, true)"
                              class="text-[10px] text-emerald-600 hover:underline font-semibold">All</button>
                      <span class="text-gray-300 dark:text-gray-600 text-[10px]">|</span>
                      <button type="button" (click)="toggleAllActions(res.key, false)"
                              class="text-[10px] text-red-400 hover:underline font-semibold">None</button>
                    </div>
                  </div>

                  <!-- Action chips -->
                  <div class="flex flex-wrap gap-1.5 flex-1">
                    <label *ngFor="let act of res.actions"
                           class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-lg border text-[11px] font-medium cursor-pointer select-none transition-all"
                           [class.opacity-40]="roleForm.get(['permissions', res.key, act.key])?.disabled"
                           [class.cursor-not-allowed]="roleForm.get(['permissions', res.key, act.key])?.disabled"
                           [class.border-gray-200]="!roleForm.get(['permissions', res.key, act.key])?.value"
                           [class.dark:border-gray-700]="!roleForm.get(['permissions', res.key, act.key])?.value"
                           [class.bg-gray-50]="!roleForm.get(['permissions', res.key, act.key])?.value"
                           [class.dark:bg-gray-800]="!roleForm.get(['permissions', res.key, act.key])?.value"
                           [class.text-gray-500]="!roleForm.get(['permissions', res.key, act.key])?.value"
                           [class.border-blue-400]="roleForm.get(['permissions', res.key, act.key])?.value"
                           [class.bg-blue-50]="roleForm.get(['permissions', res.key, act.key])?.value"
                           [class.text-blue-700]="roleForm.get(['permissions', res.key, act.key])?.value"
                           [class.dark:bg-blue-900\/20]="roleForm.get(['permissions', res.key, act.key])?.value"
                           [class.dark:text-blue-400]="roleForm.get(['permissions', res.key, act.key])?.value">
                      <input type="checkbox" [formControlName]="act.key"
                             class="w-3 h-3 accent-blue-600 rounded" />
                      <i [class]="'pi ' + act.icon + ' text-[9px]'"></i>
                      {{ act.label }}
                    </label>
                  </div>

                </div>
              </div>
            </div>
          </ng-container>

        </div><!-- /formGroupName="permissions" -->

      </form>
    </div>

    <!-- Footer -->
    <div class="px-6 py-4 border-t border-gray-100 dark:border-gray-700 flex justify-end gap-3 shrink-0 bg-gray-50 dark:bg-gray-800/50">
      <button type="button" (click)="closeModal()"
              class="px-4 py-2 text-sm font-medium text-gray-600 dark:text-gray-400 rounded-xl border border-gray-300 dark:border-gray-600 hover:bg-gray-100 dark:hover:bg-gray-700 transition-all">
        {{ 'COMMON.CANCEL' | translate }}
      </button>
      <button type="button" (click)="submitRole()"
              [disabled]="isSubmitting || roleForm.invalid"
              class="px-5 py-2 text-sm font-semibold text-white bg-blue-600 hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed rounded-xl transition-all flex items-center gap-2">
        <i *ngIf="isSubmitting" class="pi pi-spinner pi-spin text-xs"></i>
        {{ isSubmitting ? ('COMMON.SAVING' | translate) : ('COMMON.SAVE' | translate) }}
      </button>
    </div>

  </div>
</p-dialog>
