
<div class="min-h-screen flex items-center justify-center bg-slate-50 dark:bg-slate-950 p-6">
  <div class="w-full max-w-md space-y-8 bg-white dark:bg-slate-900 p-10 rounded-2xl shadow-xl border border-slate-200 dark:border-slate-700 animate-fade-in-up">

    <div class="text-center">
      <div class="w-14 h-14 rounded-2xl bg-primary-50 dark:bg-primary-900/30 flex items-center justify-center mx-auto mb-4">
        <i class="pi pi-lock text-primary-600 dark:text-primary-400 text-2xl"></i>
      </div>
      <h2 class="text-2xl font-bold text-slate-900 dark:text-white">Create New Password</h2>
      <p class="mt-2 text-slate-500 dark:text-slate-400 text-sm">Enter a strong password to secure your account.</p>
    </div>

    <form class="space-y-5" (ngSubmit)="onResetPassword()">

      <div class="form-group !mb-0">
        <label>New Password <span class="text-red-500">*</span></label>
        <div class="input-icon-wrap">
          <i class="pi pi-lock pointer-events-none"></i>
          <input [type]="showNewPassword ? 'text' : 'password'" name="newPassword"
                 [(ngModel)]="newPassword" placeholder="••••••••" maxlength="25"
                 autocomplete="new-password" class="!pr-11" />
          <button type="button" (click)="showNewPassword = !showNewPassword"
                  class="absolute right-3.5 top-1/2 -translate-y-1/2 text-slate-400
                         hover:text-primary-600 transition-colors focus:outline-none"
                  [attr.aria-label]="showNewPassword ? 'Hide password' : 'Show password'">
            <i class="pi text-sm" [ngClass]="showNewPassword ? 'pi-eye-slash' : 'pi-eye'"></i>
          </button>
        </div>
        <p class="text-[11px] text-slate-400 mt-1">Min 8 characters — include uppercase, lowercase, number and special character.</p>
      </div>

      <div class="form-group !mb-0">
        <label>Confirm Password <span class="text-red-500">*</span></label>
        <div class="input-icon-wrap">
          <i class="pi pi-lock pointer-events-none"></i>
          <input [type]="showConfirmPassword ? 'text' : 'password'" name="confirmPassword"
                 [(ngModel)]="confirmPassword" placeholder="••••••••" maxlength="25"
                 autocomplete="new-password" class="!pr-11" />
          <button type="button" (click)="showConfirmPassword = !showConfirmPassword"
                  class="absolute right-3.5 top-1/2 -translate-y-1/2 text-slate-400
                         hover:text-primary-600 transition-colors focus:outline-none"
                  [attr.aria-label]="showConfirmPassword ? 'Hide password' : 'Show password'">
            <i class="pi text-sm" [ngClass]="showConfirmPassword ? 'pi-eye-slash' : 'pi-eye'"></i>
          </button>
        </div>
      </div>

      <button type="submit" [disabled]="isProcessing || !token"
              class="btn-primary w-full py-3.5 text-base gap-2">
        <i *ngIf="isProcessing" class="pi pi-spin pi-spinner text-sm"></i>
        <i *ngIf="!isProcessing" class="pi pi-check text-sm"></i>
        {{ isProcessing ? 'Updating...' : 'Update Password' }}
      </button>

      <div class="text-center">
        <a routerLink="/login" class="text-sm text-primary-600 hover:underline font-semibold transition-colors">
          <i class="pi pi-arrow-left text-xs mr-1"></i> Back to Login
        </a>
      </div>
    </form>
  </div>
</div>
