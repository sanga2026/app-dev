
<div *ngIf="isLoading" class="min-h-[70vh] flex flex-col items-center justify-center gap-3">
  <div class="w-12 h-12 rounded-2xl bg-primary-50 dark:bg-primary-900/30 flex items-center justify-center">
    <i class="pi pi-spin pi-spinner text-xl text-primary-600"></i>
  </div>
  <p class="text-sm text-slate-500 dark:text-slate-400 font-medium animate-pulse">Syncing role context...</p>
</div>

<div *ngIf="!isLoading && role"
     class="max-w-[1600px] mx-auto p-1 space-y-5 animate-fade-in-up">

  <!-- Breadcrumb — adapts to bank-scoped or global navigation -->
  <nav class="flex items-center gap-1.5 text-xs font-semibold uppercase tracking-wider text-slate-400 dark:text-slate-500">
    <ng-container *ngIf="bankId; else globalCrumb">
      <a [routerLink]="['/banks']" class="hover:text-primary-600 transition-colors">Banks</a>
      <i class="pi pi-chevron-right text-[8px]"></i>
      <a [routerLink]="['/banks', bankId]" [queryParams]="{ tab: 'roles' }" class="hover:text-primary-600 transition-colors">Bank Details</a>
      <i class="pi pi-chevron-right text-[8px]"></i>
    </ng-container>
    <ng-template #globalCrumb>
      <a [routerLink]="['/roles']" class="hover:text-primary-600 transition-colors">Roles</a>
      <i class="pi pi-chevron-right text-[8px]"></i>
    </ng-template>
    <span class="text-slate-800 dark:text-slate-200">{{ role.name }}</span>
  </nav>

  <!-- Tab navigation -->
  <div class="border-b border-slate-200 dark:border-slate-800">
    <nav class="flex items-center overflow-x-auto no-scrollbar gap-1 px-1">
      <button *ngFor="let tab of roleTabs"
              (click)="setTab(tab.id)"
              type="button"
              class="relative whitespace-nowrap font-semibold transition-all duration-200
                     flex items-center gap-2 border-b-[2px] -mb-[1px] outline-none group
                     py-3 px-4 text-sm"
              [class.text-primary-600]="activeTab === tab.id"
              [class.dark:text-primary-400]="activeTab === tab.id"
              [class.border-primary-600]="activeTab === tab.id"
              [class.text-slate-500]="activeTab !== tab.id"
              [class.dark:text-slate-400]="activeTab !== tab.id"
              [class.border-transparent]="activeTab !== tab.id"
              [class.hover:text-slate-700]="activeTab !== tab.id"
              [class.dark:hover:text-slate-200]="activeTab !== tab.id">
        <i class="pi {{ tab.icon }} text-sm group-hover:scale-110 transition-transform"></i>
        {{ tab.label }}
      </button>
    </nav>
  </div>

  <!-- Tab content -->
  <div class="card min-h-[500px] p-6">
    <app-role-general
      *ngIf="activeTab === 'general'"
      [role]="role"
      [bankId]="bankId"
      (refreshData)="fetchRoleDetails()">
    </app-role-general>
  </div>
</div>
