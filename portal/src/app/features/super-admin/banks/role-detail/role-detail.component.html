<p-toast position="top-right"></p-toast>

<div *ngIf="isLoading" class="min-h-[70vh] flex flex-col items-center justify-center space-y-4">
  <i class="pi pi-spin pi-spinner text-4xl text-blue-600"></i>
  <p class="text-gray-500 font-medium text-sm animate-pulse tracking-wide">Syncing role context...</p>
</div>

<div *ngIf="!isLoading && role" class="max-w-[1600px] mx-auto p-4 sm:p-6 space-y-6 animate-in fade-in slide-in-from-bottom-4 duration-500">
  
  <div class="flex flex-wrap items-center gap-2 text-xs font-semibold uppercase tracking-wider text-gray-400 dark:text-gray-500">
    <a [routerLink]="['/banks']" class="hover:text-blue-600 transition-colors">Banks</a>
    <i class="pi pi-angle-right text-[9px]"></i>
    <a [routerLink]="['/banks', bankId]" [queryParams]="{ tab: 'roles' }" class="hover:text-blue-600 transition-colors">Bank Details</a>
    <i class="pi pi-angle-right text-[9px]"></i>
    <span class="text-gray-800 dark:text-gray-200">Role: {{ role.name }}</span>
  </div>

  <div class="border-b border-gray-200 dark:border-gray-800">
    <nav class="flex items-center gap-2">
      <button *ngFor="let tab of roleTabs" 
              (click)="setTab(tab.id)" 
              class="py-3 px-4 text-sm font-semibold border-b-[3px] -mb-[2px] transition-all duration-300 outline-none flex items-center gap-2"
              [ngClass]="activeTab === tab.id ? 'text-blue-600 border-blue-600 dark:border-blue-500' : 'text-gray-500 border-transparent hover:text-gray-700'">
        <i class="pi {{ tab.icon }}"></i> {{ tab.label }}
      </button>
    </nav>
  </div>

  <div class="bg-white dark:bg-[#1a1f29] p-6 rounded-2xl shadow-sm border border-gray-200 dark:border-gray-800 min-h-[500px]">
    <app-role-general 
      *ngIf="activeTab === 'general'" 
      [role]="role" 
      [bankId]="bankId" 
      (refreshData)="fetchRoleDetails()">
    </app-role-general>
  </div>
</div>
